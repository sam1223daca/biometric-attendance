<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassBiometric - Student Dashboard</title>
    
    <!-- Unified CSS Design -->
    <link rel="stylesheet" href="/static/css/style.css?v=1.3">
</head>
<body>
    <div class="bg-blob blob-blue"></div>
    <div class="bg-blob blob-pink"></div>

    <div class="app-container" style="max-width: 650px; min-height: 100vh; padding: 20px 10px;">
        <header style="margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center;">
            <a href="/" class="brand">
                <div class="brand-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 12a10 10 0 0 1 20 0c0 .76-.05 1.52-.16 2.27" />
                        <path d="M5 12a7 7 0 0 1 14 0c0 1.45-.16 2.9-.48 4.3" />
                        <path d="M8 12a4 4 0 0 1 8 0c0 2.1-.28 4.2-.82 6.24" />
                        <path d="M11 12a1 1 0 0 1 2 0c0 2.72-.37 5.43-1.11 8.08" />
                        <path d="M12 2C6.48 2 2 6.48 2 12" />
                        <path d="M12 5c-3.87 0-7 3.13-7 7" />
                        <path d="M12 8c-2.21 0-4 1.79-4 4" />
                    </svg>
                </div>
                <span class="brand-title">Student Portal</span>
            </a>
            <a href="/" class="btn btn-secondary" style="padding: 6px 14px; font-size: 13px;">Back to Dashboard</a>
        </header>

        <!-- Student Profile Card -->
        <div class="glass-card" style="margin-bottom: 20px; padding: 20px;">
            <div style="display: flex; gap: 20px; align-items: center; flex-wrap: wrap;">
                <div style="width: 80px; height: 80px; border-radius: 50%; overflow: hidden; border: 2px solid rgba(0, 113, 227, 0.2); flex-shrink: 0; background: rgba(0,0,0,0.03); display: flex; align-items: center; justify-content: center;">
                    <img id="student-avatar" src="" alt="Student Profile" style="width: 100%; height: 100%; object-fit: cover; display: none;">
                    <span id="student-avatar-placeholder" style="font-size: 32px; color: var(--text-secondary);">👤</span>
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <h2 id="student-name" style="font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px;">Loading Profile...</h2>
                    <div style="display: flex; flex-direction: column; gap: 2px; font-size: 13px; color: var(--text-secondary);">
                        <div>Username / ID: <span id="student-username" style="font-weight: 600; color: var(--text-primary);">--</span></div>
                        <div>Role: <span id="student-role" style="font-weight: 600; color: var(--text-primary);">--</span></div>
                        <div>Department: <span id="student-dept" style="font-weight: 600; color: var(--text-primary);">--</span></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Attendance Stats Summary -->
        <div class="glass-card" style="margin-bottom: 20px; padding: 20px;">
            <h3 style="font-size: 15px; font-weight: 700; color: var(--text-secondary); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px;">Attendance Summary</h3>
            
            <!-- visual progress gauge -->
            <div style="background: rgba(0, 113, 227, 0.05); border: 1px solid rgba(0, 113, 227, 0.1); border-radius: var(--radius-medium); padding: 15px; margin-bottom: 20px; text-align: center;">
                <div style="font-size: 36px; font-weight: 800; color: var(--system-blue); letter-spacing: -1px;" id="stat-percentage">--%</div>
                <div style="font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-top: 4px;" id="stat-classes-ratio">-- present / -- classes</div>
                <div style="width: 100%; height: 8px; background: rgba(0,0,0,0.06); border-radius: 4px; overflow: hidden; margin-top: 12px;">
                    <div id="stat-progress-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, var(--system-blue) 0%, #00d2ff 100%); border-radius: 4px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);"></div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;">
                <div style="background: rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.05); border-radius: var(--radius-small); padding: 10px; text-align: center;">
                    <div style="font-size: 10px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 4px;">TOTAL</div>
                    <div style="font-size: 20px; font-weight: 700; color: var(--text-primary);" id="stat-total">--</div>
                </div>
                <div style="background: rgba(52, 199, 89, 0.04); border: 1px solid rgba(52, 199, 89, 0.1); border-radius: var(--radius-small); padding: 10px; text-align: center;">
                    <div style="font-size: 10px; font-weight: 700; color: var(--system-green); text-transform: uppercase; margin-bottom: 4px;">PRESENT</div>
                    <div style="font-size: 20px; font-weight: 700; color: var(--system-green);" id="stat-present">--</div>
                </div>
                <div style="background: rgba(255, 59, 48, 0.04); border: 1px solid rgba(255, 59, 48, 0.1); border-radius: var(--radius-small); padding: 10px; text-align: center;">
                    <div style="font-size: 10px; font-weight: 700; color: var(--system-red); text-transform: uppercase; margin-bottom: 4px;">ABSENT</div>
                    <div style="font-size: 20px; font-weight: 700; color: var(--system-red);" id="stat-absent">--</div>
                </div>
            </div>
        </div>

        <!-- Monthly & Date-wise Timelines -->
        <div class="glass-card" style="padding: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                <h3 style="font-size: 15px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;">Date-wise Attendance</h3>
                <div>
                    <select id="month-filter" style="padding: 6px 12px; font-size: 13px; border-radius: 8px; border: 1px solid rgba(0,0,0,0.12); background: rgba(255,255,255,0.8); font-family: inherit; font-weight: 600;">
                        <option value="all">All Months</option>
                    </select>
                </div>
            </div>

            <div id="timeline-container" style="display: flex; flex-direction: column; gap: 12px;">
                <div style="text-align: center; font-size: 13px; color: var(--text-secondary); padding: 20px;">Loading timeline...</div>
            </div>
        </div>
    </div>

    <!-- Student Logic JS -->
    <script src="/static/js/student.js"></script>
</body>
</html>
